name: Runner Fallback
description: >
  Checks if any self-hosted runner with the desired label is online and
  returns either the desired runner label or the fallback label.
  Authenticates via a GitHub App to mint short-lived (1h) installation
  tokens at runtime, eliminating manually-rotated PAT secrets.

inputs:
  runner:
    description: Desired runner label (e.g., arkanis-runners)
    required: true
  fallback:
    description: Fallback runner label when no online runner is found
    required: false
    default: ubuntu-latest
  app-client-id:
    description: >
      GitHub App Client ID for the App with "Self-hosted runners: Read"
      organization permission. Source from a public org variable
      (e.g., vars.RUNNER_STATUS_APP_CLIENT_ID). If empty, the action
      skips the runner check and returns the fallback runner.
    required: false
    default: ''
  app-private-key:
    description: >
      GitHub App private key (full PEM contents). Source from an org
      secret (e.g., secrets.RUNNER_STATUS_APP_PRIVATE_KEY). If empty,
      the action skips the runner check and returns the fallback runner.
    required: false
    default: ''
  org:
    description: GitHub organization name
    required: false
    default: ArkanisCorporation

outputs:
  runner:
    description: Resolved runner label to use for runs-on
    value: ${{ steps.check.outputs.runner }}

runs:
  using: composite
  steps:
    - name: Mint short-lived installation token (read-only)
      id: app-token
      if: inputs.app-client-id != '' && inputs.app-private-key != ''
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.app-client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}
        permission-organization-self-hosted-runners: read

    - name: Resolve runner
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        DESIRED: ${{ inputs.runner }}
        FALLBACK: ${{ inputs.fallback }}
        ORG: ${{ inputs.org }}
      run: |
        if [ -z "${GH_TOKEN}" ]; then
          echo "No GitHub App credentials configured, falling back to '${FALLBACK}'."
          echo "runner=${FALLBACK}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        RESPONSE=$(gh api "orgs/${ORG}/actions/runners" 2>/dev/null) || true
        if [ -z "$RESPONSE" ]; then
          echo "Warning: Could not reach runners API, falling back to '${FALLBACK}'."
          echo "runner=${FALLBACK}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        ONLINE=$(echo "$RESPONSE" | jq --arg r "$DESIRED" \
          '[.runners[] | select((.labels | map(.name) | contains([$r])) and .status == "online")] | length')

        if [ "${ONLINE:-0}" -gt 0 ]; then
          echo "${ONLINE} online runner(s) with label '${DESIRED}' found, using self-hosted."
          echo "runner=${DESIRED}" >> "$GITHUB_OUTPUT"
        else
          echo "No online runner with label '${DESIRED}', falling back to '${FALLBACK}'."
          echo "runner=${FALLBACK}" >> "$GITHUB_OUTPUT"
        fi
